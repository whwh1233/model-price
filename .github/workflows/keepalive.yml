name: Keep backend alive

on:
  schedule:
    # Every 10 minutes — Render free plan sleeps after 15 min of inactivity.
    # GitHub Actions cron is best-effort and can lag several minutes under load,
    # so we keep a comfortable margin.
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend health endpoint
        run: |
          set -euo pipefail
          url="https://model-price.onrender.com/api/health"
          for attempt in 1 2 3; do
            echo "Attempt $attempt: $url"
            if curl --fail --silent --show-error --max-time 90 "$url"; then
              echo
              echo "Backend responded on attempt $attempt."
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "Backend did not respond after 3 attempts." >&2
          exit 1
